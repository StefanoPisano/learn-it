<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Learn It</title>
    <script>
      (function() {
        // GitHub Pages SPA redirect: restore path from query parameter
        // 404.html redirects to /learn-it/?/paths → restore /learn-it/paths
        var path = window.location.search.slice(1);
        if (path && path.startsWith('/')) {
          var base = window.location.pathname.split('/').slice(0, 2).join('/');
          history.replaceState(null, null, base + path);
        }
      })();
    </script>
    <script>
      (function() {
        try {
          const stored = JSON.parse(localStorage.getItem('learn-it-theme'));
          const theme = stored && stored.state && stored.state.theme;
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
